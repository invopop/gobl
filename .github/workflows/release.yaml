#
# Tags the version declared in version.go and publishes a GitHub Release with
# auto-generated notes. Core is a pure library — no binaries are built here.
# The CLI and wasm are released from github.com/invopop/gobl.dev.
#
name: Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "version.go"

permissions:
  contents: write

jobs:
  release:
    name: Tag & Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: "0" # full history for release notes

      - name: Read current version
        run: grep 'const VERSION' version.go | sed -e 's/const VERSION Version = "\(v[^"]*\)"/GOBL_VERSION=\1/' >> "$GITHUB_ENV"

      - name: Create tag and release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "$GOBL_VERSION" >/dev/null 2>&1; then
            echo "Release $GOBL_VERSION already exists — nothing to do."
            exit 0
          fi
          gh release create "$GOBL_VERSION" \
            --target "$GITHUB_SHA" \
            --title "$GOBL_VERSION" \
            --generate-notes
