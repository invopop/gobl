name: Test Go
on:
  push:
    tags:
      - v*
    branches:
      - main
  pull_request:
jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"

      - name: Install Dependencies
        env:
          GOPROXY: https://proxy.golang.org,direct
        run: go mod download

      - name: Test
        # -coverpkg=./... credits coverage across package boundaries, so code
        # exercised through integration tests (e.g. the golden-example suite
        # driving normalization and validation) is counted for the packages
        # that own it, not only by each package's own unit tests.
        run: go test -race -coverprofile=coverage.out -covermode=atomic -coverpkg=./... ./...

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5.1.2
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

      # Skipping WASM test, this can be done by CLI
      #- name: Test WASM
      #  run: GOOS=js GOARCH=wasm go test ./... -exec=$(go env GOROOT)/misc/wasm/go_js_wasm_exec
