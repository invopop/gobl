app = "gobl-v0"
primary_region = "cdg"

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 3
  processes = ["app"]

[processes]
  app = "serve --port 8080"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
