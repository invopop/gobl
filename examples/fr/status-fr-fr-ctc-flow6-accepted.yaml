# Buyer-issued ack 23 (CDV-205, "approved"). The buyer's platform reports
# acceptance to the seller.

# `accepted` is buyer-issued (CDV-205) per Annexe A "Acteurs CDV", so
# the flow6 normaliser:
#   - fills issuer.fr-ctc-role=BY and recipient.fr-ctc-role=SE
#   - propagates the SE-roled recipient's SIREN onto Supplier so it
#     populates ref.IssuerTradeParty (MDT-129) — that's why this
#     example doesn't need to spell out a `supplier:` block.
